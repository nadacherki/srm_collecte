# Stack prod SRM Collecte : PostGIS + Redis + Django(gunicorn) + Caddy(TLS).
# Renseigner les secrets dans API_GeoDjango/.env (cf .env.example).
services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-SRM_bureau}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media:/app/pprcollecte/media
      - staticfiles:/app/pprcollecte/staticfiles
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      SRM_DOMAIN: ${SRM_DOMAIN:?SRM_DOMAIN requis pour le certificat TLS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - media:/srv/media:ro
      - staticfiles:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  media:
  staticfiles:
  caddy_data:
  caddy_config:
