name: srm_collecte
description: "Application mobile de collecte de données géospatiales pour les réseaux EP, ASS et ELEC - SRM Maroc."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.1 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  executor_lib: ^1.1.2

  # HTTP & API
  http: ^1.2.1
  crypto: ^3.0.6

  # Cartographie
  flutter_map: ^7.0.0
  flutter_map_mbtiles: ^1.0.4
  flutter_map_pmtiles: ^1.0.5
  vector_map_tiles: ^8.0.0
  vector_map_tiles_pmtiles: ^1.5.0
  latlong2: ^0.9.0

  # Projection de coordonnées WGS84 <-> Merchich Nord (EPSG:26191)
  proj4dart: ^2.1.0

  # Base de données locale (mode offline)
  sqflite: ^2.2.8+4
  sqlite3_flutter_libs: ^0.5.24

  # GPS
  location: ^8.0.1

  # Photos (1 à 4 par objet collecté)
  image_picker: ^1.0.7

  # Identifiants uniques pour les objets collectés
  uuid: ^4.3.3

  # Utilitaires
  path_provider: ^2.1.2
  path: ^1.9.0
  permission_handler: ^11.0.1
  dargon2_flutter: ^3.3.0

  # UI
  font_awesome_flutter: 10.4.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/srm_collecte_logo.png"
  adaptive_icon_foreground: "assets/srm_collecte_logo.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/srm_collecte_logo.png
    - assets/basemaps/protomaps/sprites/v4/

  fonts:
    - family: Noto Sans Regular
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: Noto Sans Italic
      fonts:
        - asset: assets/fonts/NotoSans-Italic.ttf
    - family: Noto Sans Medium
      fonts:
        - asset: assets/fonts/NotoSans-Medium.ttf
    - family: Noto Sans Devanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf

dependency_overrides:
  path_provider_android: ^2.0.30
