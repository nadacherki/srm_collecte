plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Keystore release : lu depuis android/key.properties (NON commite, cf
// .gitignore). Absent -> on retombe sur la signature debug pour les
// builds locaux/dev, mais un build `release` sans keystore est refuse
// explicitement (voir buildTypes.release plus bas).
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasReleaseKeystore = false
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
    hasReleaseKeystore = keystoreProperties.getProperty("storeFile") != null
}

android {
    namespace = "com.srm.collecte"
    compileSdk = 36
    ndkVersion "29.0.13846066"

    externalNativeBuild {
        cmake {
            path file("src/main/cpp/CMakeLists.txt")
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId = "com.srm.collecte"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
        }
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                storeFile file(keystoreProperties.getProperty("storeFile"))
                storePassword keystoreProperties.getProperty("storePassword")
                keyAlias keystoreProperties.getProperty("keyAlias")
                keyPassword keystoreProperties.getProperty("keyPassword")
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseKeystore) {
                signingConfig = signingConfigs.release
                minifyEnabled = true
                shrinkResources = true
                proguardFiles(
                    getDefaultProguardFile("proguard-android-optimize.txt"),
                    "proguard-rules.pro"
                )
            } else {
                // Build release SANS keystore : interdit pour une vraie
                // distribution. On garde la signature debug uniquement
                // pour permettre un `flutter run --release` local, mais
                // on AVERTIT bruyamment.
                logger.warn(
                    "ATTENTION: build release sans android/key.properties " +
                    "-> signe avec la cle DEBUG. NE PAS distribuer. " +
                    "Voir android/key.properties.example."
                )
                signingConfig = signingConfigs.debug
            }
        }
        debug {
            applicationIdSuffix = ".debug"
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            output.outputFileName = "SRM_Collecte-${variant.buildType.name}.apk"
        }
    }
}

flutter {
    source = "../.."
}
